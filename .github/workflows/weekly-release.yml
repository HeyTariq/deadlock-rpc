name: Weekly Release

on:
  schedule:
    # Every Tuesday at 13:00 UTC. Adjust as needed.
    - cron: "0 13 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weekly-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check for changes since last release
        id: check
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

          if [ -z "$latest_tag" ]; then
            echo "No previous release tag found; proceeding with release."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          count=$(git rev-list "${latest_tag}..HEAD" --count)
          echo "Commits since $latest_tag: $count"
          if [ "$count" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.check.outputs.has_changes == 'true'
        id: version
        run: |
          latest_tag="${{ steps.check.outputs.latest_tag }}"
          current="${latest_tag#v}"
          if [ -z "$current" ]; then
            current="0.0.0"
          fi
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Next version: $new_version"

      - name: Install system dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Install Rust
        if: steps.check.outputs.has_changes == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: weekly-release-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Bump version
        if: steps.check.outputs.has_changes == 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.new_version }}\"/" Cargo.toml
          cargo check

      - name: Commit and tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.new_version }}"
